<nav class="navbar navbar-expand-lg bg-white">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/">
      <img src="/logo.png" alt="Logo" height="40">
    </a>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item ms-2">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
        </li>
        <li class="nav-item ms-2">
          <a class="nav-link" routerLink="/about" routerLinkActive="active">About</a>
        </li>
        <li class="nav-item ms-2">
          <a class="nav-link" routerLink="/contact" routerLinkActive="active">Contact</a>
        </li>
        <li class="nav-item ms-2">
          @if(!keycloakAuth.isAuthenticated()){
            <button class="btn btn-primary ms-3" (click)="keycloak.login()">Login</button>
          } @else {
            <a class="nav-link" routerLink="/account" routerLinkActive="active">Account</a>
            <button class="btn btn-outline-danger ms-3" (click)="keycloak.logout()">Logout</button>
          }
        </li>
      </ul>
    </div>
  </div>
</nav>
